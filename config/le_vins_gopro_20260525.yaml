# Configuration file for LE-VINS

# 结果输出路径
outputpath: "/mnt/nvme1/datasets/20260525/LE-VINS"
is_make_outputdir: true

# 是否开启可视化
is_use_visualization: true

# ROS接口配置
ros:
    imu_topic: "/gopro/imu"
    image_topic: "/gopro/image_raw/compressed"
    lidar_topic: "/livox/lidar"
    use_compressed_image: true # 使用压缩图像

    # 读取ROS包
    is_read_bag: true
    bag_file: "/mnt/nvme1/datasets/20260525/campus01"

# IMU噪声建模参数
imu:
    imudatarate: 200 # IMU原始数据频率, Hz
    is_use_zupt: true # 使用零速检测和零速约束
    imu_orientation: "LBU" # IMU坐标系方向: LBU (Left-Bottom-Up), FRD (Front-Right-Down)

    arw: 0.4 # deg/sqrt(hr)
    vrw: 0.15 # m/s/sqrt(hr)
    gbstd: 10.0 # deg/hr
    abstd: 1000.0 # mGal
    corrtime: 1.0 # hr

    gb_prior_std: 10 # deg/hr
    ab_prior_std: 5000 # mGal

# 优化器
optimizer:
    optimize_reprojection_std: 3.0 # 像素重投影误差
    optimize_point_to_plane_std: 0.1 # 点到面观测协方差, m
    optimize_window_size: 10 # 滑动窗口大小

    optimize_estimate_cam_extrinsic: true # 是否估计相机和IMU的外参
    optimize_estimate_cam_td: true # 是否估计相机和IMU之间的时间间隔
    optimize_cam_extrinsic_accurate: false # 相机和IMU的外参初值准确

visual:
    is_use_lidar_depth: false # 使用激光深度增强
    track_max_features: 250 # 最大提取特征数量
    # mask_file: "/mnt/nvme1/datasets/20260525/mask_template2.png" # 用户自定义掩码文件路径, 若不使用掩码则留空
    # 内参 [fx, fy, cx, cy(, skew)]
    # camera_model: kannala_brandt8
    # intrinsic: [440.649388026254, 440.72260540867956, 480.91099956843425, 264.8917872670275]
    intrinsic: [451.34073023825806, 451.9064183809128, 479.78019808966025, 257.82734789876633]

    # 畸变参数 [k1, k2, p1, p2(, k3)]
    # distortion: [0.03570125312090746, 0.05919836675086403, -0.04408173944557452,
    #     0.00939075185133261]
    distortion: [-3.4259447448837164e-09,1.1282867918122256e-18,-0.0026242864498785714,0.00195194317000109,-2.649890195959425e-28]

    # 图像分辨率
    resolution: [960, 540]

    # 相机IMU外参 Pb = q_b_c * Pc + t_b_c
    # true: q_b_c/t_b_c is calibrated in the raw IMU frame and will be converted to internal FRD.
    extrinsic_in_raw_imu_frame: true
    # q (x, y, z, w)
    q_b_c: [0.002416585476968828, -0.7052862821400451, 0.7089157927543835, 0.001954257692674749]
    t_b_c: [0.020190683663038146, -0.053204329932253984, -0.0037557191496503262]

    # IMU和相机时间延时
    # t_b = t_c + td
    td_b_c: 0.0

    # 激光相机外参 Pc = q_c_l * Pl + t_c_l
    # q (x, y, z, w)
    q_c_l: [0.510336, -0.488986, 0.493321, 0.507034]
    t_c_l: [-0.00205198, -0.0897518, 0.0223906]

    # t_b = t_l + td
    td_b_l: 0.0

lidar:
    # 激光参数
    lidar_type: 1 # Livox: 1; Velodyne: 2; Ouster: 3; Hesai: 4
    scan_line: 1 # 扫描线数
    nearest_distance: 1 # 扫描盲区, m
    farthest_distance: 250.0 # 最远距离, m
    frame_rate: 10 # 帧率, Hz
